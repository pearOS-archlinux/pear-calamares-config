#
# Netinstall opțional: dacă există @@ROOT@@/etc/calamares/netinstall-url
# și conține un URL, se descarcă lista de pachete (un pachet per linie)
# și se instalează cu pacman. Liniile goale și cele care încep cu # sunt ignorate.
#
# Offline: nu crea fișierul sau lasă-l gol → se folosește doar airootfs (unpackfs).
---
i18n:
  name: "Installing additional packages (netinstall)"

dontChroot: false
timeout: 1800

script:
  - |
    NETINSTALL_URL_FILE="@@ROOT@@/etc/calamares/netinstall-url"
    if [ -f "$NETINSTALL_URL_FILE" ]; then
      URL=$(grep -v '^#' "$NETINSTALL_URL_FILE" | grep -v '^[[:space:]]*$' | head -1)
      if [ -n "$URL" ]; then
        echo "Netinstall: preiau lista de pachete de la $URL"
        curl -sfL "$URL" | grep -v '^#' | grep -v '^[[:space:]]*$' | pacman -S --noconfirm -
      fi
    fi
