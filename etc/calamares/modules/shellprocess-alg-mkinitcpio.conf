#
# Configuration for the shell process job.

---
dontChroot: false
timeout: 10
# Destinația: primul linux*.preset găsit, sau linux.preset dacă nu există niciunul
# Prefix „-” = ignoră eroarea, instalatorul continuă
script:
    - "-mv -v @@ROOT@@/etc/mkinitcpio.d/pear @@ROOT@@/etc/mkinitcpio.d/linux.preset"
  
