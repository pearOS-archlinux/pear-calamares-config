#
# Rulează mkinitcpio; nu oprește instalatorul la eroare (prefix -).
---
i18n:
  name: "Creating initramfs (mkinitcpio)"

dontChroot: false
timeout: 120

# Prefix „-” = ignoră eroarea, trece la pasul următor
script:
    - "-mkinitcpio -p linux"
