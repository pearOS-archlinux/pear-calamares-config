#
# Configure default pearOS user and post-install autostart entry.
#
# This runs outside the target chroot (dontChroot: true) and uses ${ROOT}
# as the target root mountpoint.

---

i18n:
    name: "Configure pearOS default user and post-install"

dontChroot: true
timeout: 1000

script:
    # Copy pearOS post-install assets into the target system
    - command: "mkdir -p ${ROOT}/usr/share"
    - command: "cp -r /usr/share/pearOS-installer ${ROOT}/usr/share/"
    - command: "install -Dm755 /usr/share/pearOS-installer/general_bin/bin_post ${ROOT}/usr/local/bin/bin_post"

    # Create autostart .desktop entry in /etc/skel so it applies to the new user
    - command: "mkdir -p ${ROOT}/etc/skel/.config/autostart"
    - command: "bash -c 'echo \"[Desktop Entry]\" > ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"
    - command: "bash -c 'echo \"Name=pearOS Post Install\" >> ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"
    - command: "bash -c 'echo \"Comment=Scripts for the after-install time\" >> ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"
    - command: "bash -c 'echo \"GenericName=PostInstall\" >> ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"
    - command: "bash -c 'echo \"Icon=nicec0re-logo\" >> ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"
    - command: "bash -c 'echo \"Categories=Utility;X-SuSE-DesktopUtility;\" >> ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"
    - command: "bash -c 'echo \"Exec=bash /usr/local/bin/bin_post\" >> ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"
    - command: "bash -c 'echo \"Terminal=false\" >> ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"
    - command: "bash -c 'echo \"Type=Application\" >> ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"
    - command: "bash -c 'echo \"X-DBUS-ServiceName=xyz.pearos-post-install\" >> ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"
    - command: "bash -c 'echo \"X-DBUS-StartupType=unique\" >> ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"
    - command: "bash -c 'echo \"X-KDE-PluginInfo-Author=Alexandru Balan\" >> ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"
    - command: "bash -c 'echo \"X-KDE-PluginInfo-Email=alxb421@gmail.com\" >> ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"
    - command: "bash -c 'echo \"X-KDE-PluginInfo-Version=22.03\" >> ${ROOT}/etc/skel/.config/autostart/xyz.pearos-post-install.desktop'"

    # Create default user in the target system and configure sudo + autologin
    # Username: default
    # Password: pearos  (you can change this later with `passwd default`)
    - command: "arch-chroot ${ROOT} useradd -m -g users -G wheel,autologin -s /bin/bash default"
    - command: "arch-chroot ${ROOT} bash -c \"echo 'default:pearos' | chpasswd\""
    - command: "arch-chroot ${ROOT} usermod -aG wheel,autologin default"
    - command: "sed -i 's/# %wheel ALL=(ALL) ALL$/%wheel ALL=(ALL) ALL/' ${ROOT}/etc/sudoers"
    - command: "bash -c \"printf 'default ALL=(ALL) NOPASSWD:ALL\n' >> ${ROOT}/etc/sudoers\""