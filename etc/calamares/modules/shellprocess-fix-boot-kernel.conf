---
i18n:
  name: "Fixing kernel image in /boot"

dontChroot: false
timeout: 120

script:
  - "bash -lc 'set -euo pipefail; kver=$(ls -1 /usr/lib/modules 2>/dev/null | sort -V | tail -n1 || true); if [[ -n \"${kver:-}\" && -s \"/usr/lib/modules/$kver/vmlinuz\" ]]; then install -Dm644 \"/usr/lib/modules/$kver/vmlinuz\" /boot/vmlinuz-linux; fi; if [[ ! -s /boot/vmlinuz-linux ]]; then echo \"Eroare: /boot/vmlinuz-linux lipsește sau e 0B\" >&2; exit 1; fi'"

