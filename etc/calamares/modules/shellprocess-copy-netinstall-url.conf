#
# Copiază URL-ul ales de user în launch.sh din /tmp (live) în root-ul țintă,
# ca shellprocess@netinstall să poată instala pachetele de pe internet.
---
dontChroot: true
timeout: 5
script:
  - "mkdir -p @@ROOT@@/etc/calamares"
  - "if [ -f /tmp/calamares-netinstall-url ]; then cp /tmp/calamares-netinstall-url @@ROOT@@/etc/calamares/netinstall-url; fi"
