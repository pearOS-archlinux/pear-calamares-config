#
# Step where the user chooses: Offline (airootfs only) or Netinstall (list from internet).
# Strings are loaded from /etc/calamares/netinstall-dialog-strings.sh (translatable per LANG).
---
i18n:
  name: "Install type (Offline / Netinstall)"

dontChroot: true
timeout: 300

script:
  - |
    NETINSTALL_MARKER="/tmp/calamares-netinstall-url"
    STRINGS="/etc/calamares/netinstall-dialog-strings.sh"
    rm -f "$NETINSTALL_MARKER"
    export DISPLAY="${DISPLAY:-:0}"
    if [ -f "$STRINGS" ]; then . "$STRINGS"; else
      TITLE="Install type"; PROMPT="How do you want to install?"
      OPT_OFFLINE="Offline (image contents only)"; OPT_NETINSTALL="Netinstall (additional packages from the internet)"
      URL_TITLE="Package list URL"; URL_PROMPT="Enter the URL to a package list (one package per line):"
      TERMINAL_PROMPT="Install type: 1 = Offline, 2 = Netinstall"; TERMINAL_CHOICE="Choice [1]: "; TERMINAL_URL_PROMPT="Package list URL: "
    fi
    if type zenity &>/dev/null; then
      MODE=$(zenity --list --title "$TITLE" --text "$PROMPT" --column "" "$OPT_OFFLINE" "$OPT_NETINSTALL" --height 220 2>/dev/null)
      if [[ "$MODE" == "$OPT_NETINSTALL" ]]; then
        URL=$(zenity --entry --title "$URL_TITLE" --text "$URL_PROMPT" --width 500 2>/dev/null)
        [[ -n "$URL" ]] && echo "$URL" > "$NETINSTALL_MARKER"
      fi
    elif type kdialog &>/dev/null; then
      MODE=$(kdialog --title "$TITLE" --menu "$PROMPT" "1" "$OPT_OFFLINE" "2" "$OPT_NETINSTALL" 2>/dev/null)
      if [[ "$MODE" == "2" ]]; then
        URL=$(kdialog --title "$URL_TITLE" --inputbox "$URL_PROMPT" 2>/dev/null)
        [[ -n "$URL" ]] && echo "$URL" > "$NETINSTALL_MARKER"
      fi
    else
      echo "$TERMINAL_PROMPT"
      read -r -p "$TERMINAL_CHOICE" MODE
      MODE=${MODE:-1}
      if [[ "$MODE" == "2" ]]; then
        read -r -p "$TERMINAL_URL_PROMPT" URL
        [[ -n "$URL" ]] && echo "$URL" > "$NETINSTALL_MARKER"
      fi
    fi
